<div class="dashboard">
  <h1 class="dashboard__title">Pokédex</h1>

  <app-search-bar />
  <app-filter-bar />

  @if (loading$ | async) {
    <div class="dashboard__loading">Loading Pokémon...</div>
  }

  @if (error$ | async; as error) {
    <div class="dashboard__error">
      {{ error }}
    </div>
  }

  @if (!(loading$ | async)) {
    <div class="dashboard__grid">
      @for (pokemon of (pokemon$ | async) ?? []; track pokemon.id) {
        <app-pokemon-card [pokemon]="pokemon" />
      }
    </div>
  }
</div>
